name: "🐛 Bug / バグ報告"
description: 不具合の報告
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: 概要
      description: 何が起きているか
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 再現手順
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期待する挙動
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 実際の挙動
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: 環境
      description: OS / ブラウザ / バージョン / コミットハッシュなど
  - type: textarea
    id: notes
    attributes:
      label: 補足
      description: ログ・スクリーンショットなど
