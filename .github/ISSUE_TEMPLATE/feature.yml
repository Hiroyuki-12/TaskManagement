name: "✨ Feature / 機能追加"
description: 新しい機能や改善の提案
title: "[Feature] "
labels: ["feature"]
body:
  - type: textarea
    id: summary
    attributes:
      label: 概要
      description: 何を追加・改善したいか1〜2行で
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: 背景・目的
      description: なぜ必要か。誰のどんな課題を解くか。
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: 受け入れ条件
      description: チェックリスト形式で具体的に
      value: |
        - [ ]
        - [ ]
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: 補足
      description: 参考リンク・スクリーンショット・代替案など
